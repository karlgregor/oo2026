<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="03_Calculator.js"></script>
<script>
    let calcobj = null;

    function startPage() {
        calcobj = new Calculator();
        updateDisplay();
    }

    function press(value) {
        calcobj.pressButton(value);
        updateDisplay();
    }

    function updateDisplay() {
        const display = document.getElementById("panel1");
        display.innerText = calcobj.getPanelContent() || "0";
    }
</script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        #panel1 {
            width: 210px;
            height: 60px;
            border: 2px solid #333;
            background: white;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button {
            width: 50px;
            height: 50px;
            font-size: 18px;
            margin: 3px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
        }

        button:hover {
            background: #d0d0d0;
        }

        #calculator {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
    </style>
</head>
<body onload="startPage()">
    <div id="calculator">
        <div id="panel1"></div>
        <div class="buttons">
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>

            <button onclick="press('0')">0</button>
            <button onclick="press('+')">+</button>
            <button onclick="press('=')">=</button>

            <button onclick="press('C')">C</button>
        </div>
    </div>
</body>
</html>
